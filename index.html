<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>watchime</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    [data-theme="light"]{--bg:#fdf6ee;--surface:#fff;--card:#fff4eb;--border:#e8d5bf;--text:#2e1f0f;--muted:#9a7a5a;--accent:#f05c2a;--accent2:#f9a26c;--tag-bg:#fde8d8;--tag-text:#c94010;--shadow:rgba(240,92,42,0.13);--blob1:#ffd4b8;--blob2:#ffc8d8;--blob3:#ffeaa0}
    [data-theme="dark"]{--bg:#16100a;--surface:#251a10;--card:#2e1e12;--border:#3d2a1a;--text:#f0e0cc;--muted:#9a7a5a;--accent:#f97140;--accent2:#ffa870;--tag-bg:rgba(249,113,64,0.18);--tag-text:#f97140;--shadow:rgba(249,113,64,0.18);--blob1:rgba(249,113,64,0.08);--blob2:rgba(255,100,120,0.06);--blob3:rgba(255,200,80,0.05)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;transition:background .3s,color .3s}
    .blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
    .blob-1{width:480px;height:480px;background:var(--blob1);top:-120px;left:-80px;animation:drift 14s ease-in-out infinite}
    .blob-2{width:380px;height:380px;background:var(--blob2);bottom:-80px;right:-60px;animation:drift 18s ease-in-out infinite reverse}
    .blob-3{width:260px;height:260px;background:var(--blob3);top:45%;left:52%;animation:drift 11s ease-in-out infinite 2s}
    @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-35px)}}
    header{position:sticky;top:0;z-index:100;background:rgba(253,246,238,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1.5px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
    [data-theme="dark"] header{background:rgba(22,16,10,0.88)}
    .logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
    .logo-icon{width:38px;height:38px;flex-shrink:0}
    .logo-text{font-family:'Baloo 2',cursive;font-size:1.55rem;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1;transition:color .3s}
    .logo-text span{color:var(--accent)}
    .header-right{display:flex;align-items:center;gap:10px}
    .nav-tabs{display:flex;gap:4px;background:var(--card);border:1.5px solid var(--border);border-radius:99px;padding:3px}
    .nav-tab{background:none;border:none;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;color:var(--muted);padding:4px 12px;border-radius:99px;cursor:pointer;transition:all .2s}
    .nav-tab.active,.nav-tab:hover{background:var(--accent);color:#fff}
    .theme-toggle{width:52px;height:28px;background:var(--card);border:1.5px solid var(--border);border-radius:99px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
    .theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--accent);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
    [data-theme="dark"] .theme-toggle::after{transform:translateX(24px)}
    .theme-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
    .theme-icon.sun{left:6px}
    .theme-icon.moon{right:5px}
    [data-theme="dark"] .theme-icon.sun{opacity:.3}
    [data-theme="light"] .theme-icon.moon{opacity:.3}
    main{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 1.5rem 4rem}
    .search-section{padding:2rem 0 1.5rem}
    .search-row{display:flex;gap:10px;max-width:580px;margin:0 auto}
    .search-row input{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:.8rem 1.2rem;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .search-row input::placeholder{color:var(--muted)}
    .search-row input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--shadow)}
    .search-row button{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:0 1.4rem;font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap}
    .search-row button:hover{background:var(--accent2);transform:scale(1.04)}
    .section-head{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;margin-top:.5rem}
    .section-head h2{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800}
    .badge{background:var(--tag-bg);color:var(--tag-text);font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px;letter-spacing:.04em}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem}
    .anime-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
    .anime-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 14px 32px var(--shadow);border-color:var(--accent)}
    @keyframes popIn{from{opacity:0;transform:scale(.85) translateY(12px)}to{opacity:1;transform:none}}
    .card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--card)}
    .card-body{padding:.7rem .75rem .8rem}
    .card-title{font-size:.85rem;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-sub{font-size:.72rem;color:var(--muted);margin-top:3px;font-weight:600}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:4rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
    .empty .big{font-size:3.5rem;margin-bottom:.75rem}
    .empty p{font-weight:600;font-size:1rem}
    #detail-view{display:none}
    #detail-view.open{display:block}
    .detail-hero{display:flex;gap:1.5rem;padding:1.5rem 0;align-items:flex-start;flex-wrap:wrap}
    .detail-poster{width:160px;flex-shrink:0;border-radius:12px;overflow:hidden;border:1.5px solid var(--border);box-shadow:0 8px 24px var(--shadow)}
    .detail-poster img{width:100%;display:block}
    .detail-info{flex:1;min-width:200px}
    .detail-title{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;line-height:1.2;margin-bottom:.5rem}
    .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.8rem}
    .detail-tag{background:var(--tag-bg);color:var(--tag-text);font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px}
    .detail-desc{font-size:.88rem;line-height:1.6;color:var(--muted);max-height:100px;overflow:hidden}
    .detail-desc.expanded{max-height:none}
    .read-more{background:none;border:none;color:var(--accent);font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;padding:4px 0;display:block;margin-top:4px}
    .back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:99px;padding:6px 16px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);cursor:pointer;margin:1rem 0 0;transition:border-color .2s}
    .back-btn:hover{border-color:var(--accent);background:var(--tag-bg)}
    .stream-controls{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:.85rem 1.1rem;margin-bottom:1rem}
    .ctrl-label{font-size:.7rem;font-weight:800;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-right:4px}
    .subdub-wrap,.source-wrap{display:flex;align-items:center;gap:6px}
    .source-wrap{flex:1;flex-wrap:wrap}
    .subdub-pills{display:flex;background:var(--surface);border:1.5px solid var(--border);border-radius:99px;padding:3px;gap:2px}
    .subdub-btn{background:none;border:none;font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:800;color:var(--muted);padding:3px 12px;border-radius:99px;cursor:pointer;transition:all .2s}
    .subdub-btn.active{background:var(--accent);color:#fff}
    .source-pills{display:flex;flex-wrap:wrap;gap:6px}
    .source-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:99px;padding:4px 12px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;color:var(--muted);cursor:pointer;transition:all .2s}
    .source-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .source-btn.ok:not(.active):hover{border-color:var(--accent);color:var(--accent)}
    .source-btn.error{opacity:.4;cursor:not-allowed;text-decoration:line-through}
    .source-btn.loading{opacity:.6;cursor:wait}
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:1rem}
    .ep-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:.6rem .4rem;text-align:center;font-family:'Baloo 2',cursive;font-size:.9rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s}
    .ep-btn:hover{background:var(--tag-bg);border-color:var(--accent);color:var(--accent)}
    .ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    /* ── Player ── */
    #player-wrap{display:none;margin-top:1.5rem;background:#000;border-radius:16px;overflow:hidden;border:1.5px solid var(--border);box-shadow:0 16px 48px rgba(0,0,0,.35)}
    #player-wrap.open{display:block}
    .video-container{position:relative;width:100%;background:#000;aspect-ratio:16/9;cursor:pointer}
    .video-container video{width:100%;height:100%;display:block;object-fit:contain}
    .vid-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.78);color:#fff;gap:.75rem;z-index:5}
    .vid-loading .spinner{margin:0;border-color:rgba(255,255,255,.3);border-top-color:#fff;width:36px;height:36px}
    .vid-loading p{font-size:.85rem;font-weight:600;opacity:.8}
    .vid-loading.hidden{display:none}
    .vid-controls{position:absolute;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:.6rem .8rem .7rem;opacity:0;transition:opacity .25s}
    .video-container:hover .vid-controls,.video-container.show-controls .vid-controls{opacity:1}
    .progress-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
    .time-label{color:rgba(255,255,255,.85);font-size:.72rem;font-weight:700;white-space:nowrap;min-width:72px;font-family:'Baloo 2',cursive}
    .progress-track{flex:1;height:4px;background:rgba(255,255,255,.25);border-radius:99px;position:relative;cursor:pointer;transition:height .15s}
    .progress-track:hover{height:7px}
    .progress-fill{height:100%;background:var(--accent);border-radius:99px;pointer-events:none}
    .progress-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;margin:0}
    .ctrl-row{display:flex;align-items:center;gap:.5rem}
    .ctrl-row .right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
    .vid-btn{background:none;border:none;color:#fff;cursor:pointer;padding:.3rem .45rem;border-radius:8px;line-height:1;transition:background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .vid-btn:hover{background:rgba(255,255,255,.18)}
    .vid-btn svg{width:22px;height:22px;fill:currentColor}
    .vid-btn.active-cc{color:var(--accent)}
    .vol-wrap{display:flex;align-items:center;gap:.35rem}
    .vol-slider{-webkit-appearance:none;appearance:none;width:70px;height:4px;border-radius:99px;background:rgba(255,255,255,.3);outline:none;cursor:pointer}
    .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
    .player-bar{background:var(--surface);padding:.6rem 1rem;border-top:1.5px solid var(--border);font-size:.82rem;font-weight:700;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:.75rem 1.4rem;border-radius:12px;font-size:.88rem;font-weight:700;z-index:9000;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.error{background:var(--accent);color:#fff}
    #toast.success{background:#56d888;color:#111}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
  </style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>

<header>
  <div class="logo-wrap" onclick="goHome()">
    <svg class="logo-icon" viewBox="0 0 38 38" fill="none">
      <rect x="8" y="17" width="22" height="16" rx="4" fill="var(--accent)"/>
      <rect x="14" y="17" width="4" height="16" fill="var(--accent2)" opacity=".5"/>
      <rect x="24" y="17" width="2" height="16" fill="var(--accent2)" opacity=".5"/>
      <circle cx="11" cy="15" r="4" fill="var(--accent2)"/>
      <circle cx="19" cy="13" r="5" fill="#ffe08a"/>
      <circle cx="27" cy="15" r="4" fill="var(--accent2)"/>
      <circle cx="15" cy="12" r="3.5" fill="#ffe08a"/>
      <circle cx="23" cy="12" r="3.5" fill="var(--accent)"/>
      <polygon points="16,22 16,30 24,26" fill="white" opacity=".9"/>
    </svg>
    <span class="logo-text">watch<span>ime</span></span>
  </div>
  <div class="header-right">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('trending',this)">🔥 trending</button>
      <button class="nav-tab"        onclick="switchTab('seasonal',this)">🌸 seasonal</button>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span class="theme-icon sun">☀️</span>
      <span class="theme-icon moon">🌙</span>
    </button>
  </div>
</header>

<main>
  <div class="search-section">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="search for an anime…" autocomplete="off"/>
      <button onclick="doSearch()">search</button>
    </div>
  </div>

  <div id="home-view">
    <div class="section-head"><h2 id="home-title">🔥 Trending Now</h2><span class="badge">ANILIST</span></div>
    <div id="home-grid" class="grid"><div class="spinner"></div></div>
  </div>

  <div id="search-view" style="display:none">
    <div class="section-head"><h2 id="search-heading">Results</h2></div>
    <div id="search-grid" class="grid"></div>
  </div>

  <div id="detail-view">
    <button class="back-btn" id="back-btn">← back</button>
    <div class="detail-hero">
      <div class="detail-poster"><img id="detail-img" src="" alt=""/></div>
      <div class="detail-info">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-tags"  id="detail-tags"></div>
        <div class="detail-desc"  id="detail-desc"></div>
        <button class="read-more" id="read-more-btn" onclick="toggleReadMore()">read more ↓</button>
      </div>
    </div>

    <div class="stream-controls">
      <div class="subdub-wrap">
        <span class="ctrl-label">audio</span>
        <div class="subdub-pills">
          <button class="subdub-btn active" id="btn-sub" onclick="setSubDub('sub',this)">SUB</button>
          <button class="subdub-btn"        id="btn-dub" onclick="setSubDub('dub',this)">DUB</button>
        </div>
      </div>
      <div class="source-wrap">
        <span class="ctrl-label">source</span>
        <div class="source-pills" id="source-pills"></div>
      </div>
    </div>

    <div id="player-wrap">
      <div class="video-container" id="vid-container">
        <video id="video-el" playsinline preload="metadata"></video>
        <div class="vid-loading hidden" id="vid-loading">
          <div class="spinner"></div>
          <p id="vid-loading-msg">loading stream…</p>
        </div>
        <div class="vid-controls">
          <div class="progress-row">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
              <input type="range" class="progress-input" id="progress-input" value="0" min="0" max="100" step="0.05"/>
            </div>
            <span class="time-label" id="time-label">0:00 / 0:00</span>
          </div>
          <div class="ctrl-row">
            <button class="vid-btn" onclick="togglePlay()">
              <svg id="icon-play"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="vid-btn" onclick="skipTime(-10)"><svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
            <button class="vid-btn" onclick="skipTime(10)"><svg viewBox="0 0 24 24"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
            <div class="vol-wrap">
              <button class="vid-btn" onclick="toggleMute()">
                <svg id="icon-vol"  viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <svg id="icon-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1.47 1.47L20.46 18 5.73 3 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
              <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.05" value="1"/>
            </div>
            <div class="right">
              <button class="vid-btn" id="cc-btn" onclick="toggleSubtitles()" title="Subtitles">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 8H9.5v-.5h-2v3h2V14H11v1c0 .55-.45 1-1 1H7c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1zm7 0h-1.5v-.5h-2v3h2V14H18v1c0 .55-.45 1-1 1h-3c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1z"/></svg>
              </button>
              <button class="vid-btn" onclick="toggleFullscreen()">
                <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="player-bar" id="player-bar">pick an episode below</div>
    </div>

    <div class="section-head" style="margin-top:1.5rem">
      <h2>Episodes</h2><span class="badge" id="ep-badge">—</span>
    </div>
    <div id="ep-grid" class="ep-grid"></div>
  </div>
</main>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// WATCHIME — Full-Stack (5 Sources via Netlify Functions)
//
// Sources:  HiAnime · GogoAnime · Kaido · AllAnime · (+ mirrors)
// The frontend calls /api/anime?action=...&source=...
// which hits netlify/functions/anime.js (runs server-side,
// so no CORS issues when reaching streaming APIs).
// ═══════════════════════════════════════════════════════════

const ANILIST = "https://graphql.anilist.co";
const API     = "/api/anime"; // → netlify/functions/anime.js

// Source definitions — labels shown in the UI pills
const SOURCES = {
  hianime:   { label: "HiAnime"   },
  gogoanime: { label: "GogoAnime" },
  kaido:     { label: "Kaido"     },
  allanime:  { label: "AllAnime"  },
};

let currentAnime = null;
let subDub       = "sub";
let activeSource = "hianime";
let sourceData   = {};   // { [key]: { status, episodes, searchId, ... } }
let hls          = null;
let subtitleOn   = false;
let ctrlTimer    = null;

// ── Call our own Netlify function ──────────────────────────
async function apiCall(params, timeout = 14000) {
  const url  = `${API}?${new URLSearchParams(params)}`;
  const ctrl = new AbortController();
  const t    = setTimeout(() => ctrl.abort(), timeout);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.error || `HTTP ${r.status}`);
    }
    return await r.json();
  } finally { clearTimeout(t); }
}

// ── AniList (browser-side, CORS is allowed) ───────────────
async function anilistQ(query, vars = {}) {
  const r = await fetch(ANILIST, {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "application/json" },
    body: JSON.stringify({ query, variables: vars }),
  });
  const j = await r.json();
  if (j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

// ══════════════════════════════════════════════════════════
// EPISODE FETCHING (calls server-side function for each source)
// ══════════════════════════════════════════════════════════

async function fetchEpisodes(sourceKey, titleRomaji, titleEnglish) {
  const title = titleRomaji || titleEnglish || "";

  // Step 1: search for the anime on this source to get its internal ID
  const searchResults = await apiCall({ action: "search", source: sourceKey, title });
  const results = Array.isArray(searchResults) ? searchResults : [];
  if (!results.length) throw new Error(`not found on ${SOURCES[sourceKey].label}`);

  // Pick the best title match
  const kw    = title.toLowerCase().split(" ")[0];
  const match = results.find(r => (r.title||"").toLowerCase().includes(kw)) || results[0];
  const animeId = match.id;

  // Step 2: get episodes for that anime
  const episodes = await apiCall({ action: "episodes", source: sourceKey, id: animeId });
  const epList   = Array.isArray(episodes) ? episodes : [];
  if (!epList.length) throw new Error(`no episodes on ${SOURCES[sourceKey].label}`);

  return { episodes: epList, animeId, match };
}

// ══════════════════════════════════════════════════════════
// SOURCE PROBING — all 4 probed in parallel when anime opens
// ══════════════════════════════════════════════════════════
async function probeSources(titleRomaji, titleEnglish) {
  sourceData = {};
  Object.keys(SOURCES).forEach(k => { sourceData[k] = { status: "loading", episodes: [] }; });
  renderSourcePills();

  await Promise.allSettled(Object.keys(SOURCES).map(async key => {
    try {
      const { episodes, animeId, match } = await fetchEpisodes(key, titleRomaji, titleEnglish);
      sourceData[key] = { status: "ok", episodes, animeId, match };
    } catch(e) {
      sourceData[key] = { status: "error", episodes: [], error: e.message };
    }
    renderSourcePills();
  }));

  // Auto-select first working source
  const order   = ["hianime", "kaido", "allanime", "gogoanime"];
  const working = order.find(k => sourceData[k]?.status === "ok");
  if (working) {
    activeSource = working;
    renderSourcePills();
    renderEpisodes(sourceData[working].episodes);
  } else {
    renderFallback();
  }
}

// ══════════════════════════════════════════════════════════
// STREAM FETCHING
// ══════════════════════════════════════════════════════════
async function fetchStream(sourceKey, ep, epNum) {
  const type = subDub;

  if (sourceKey === "hianime") {
    return apiCall({ action: "stream", source: "hianime", id: ep.id, type });
  }
  if (sourceKey === "gogoanime") {
    return apiCall({ action: "stream", source: "gogoanime", id: ep.id });
  }
  if (sourceKey === "kaido") {
    return apiCall({ action: "stream", source: "kaido", id: ep.id, type });
  }
  if (sourceKey === "allanime") {
    const showId = sourceData.allanime?.animeId || "";
    return apiCall({ action: "stream", source: "allanime", id: ep.id, showId, epNum, type });
  }
  throw new Error("unknown source");
}

function extractStreamUrl(sourceKey, data) {
  // Each source returns data slightly differently
  if (sourceKey === "hianime") {
    const srcs = data?.data?.sources || data?.sources || [];
    const src  = srcs.find(s => s.url?.includes(".m3u8")) || srcs[0];
    return { url: src?.url, headers: data?.data?.headers || data?.headers || {} };
  }
  if (sourceKey === "gogoanime") {
    const srcs = data?.sources || [];
    const src  = srcs.find(s => s.isM3U8 || s.url?.includes(".m3u8")) || srcs[0];
    return { url: src?.url, headers: data?.headers || {} };
  }
  if (sourceKey === "kaido") {
    // { url, headers } already extracted server-side
    return { url: data?.url, headers: data?.headers || {} };
  }
  if (sourceKey === "allanime") {
    return { url: data?.url, headers: {} };
  }
  throw new Error("unknown source for stream extraction");
}

// ══════════════════════════════════════════════════════════
// UI — source pills, episode grid
// ══════════════════════════════════════════════════════════
function renderSourcePills() {
  const wrap = document.getElementById("source-pills");
  if (!wrap) return;
  wrap.innerHTML = "";
  Object.entries(SOURCES).forEach(([key, cfg]) => {
    const st   = sourceData[key]?.status || "loading";
    const icon = st === "loading" ? "⏳" : st === "ok" ? "✓" : "✗";
    const btn  = document.createElement("button");
    btn.className = `source-btn ${st} ${activeSource === key ? "active" : ""}`;
    btn.innerHTML = `${icon} ${cfg.label}`;
    btn.disabled  = st === "loading";
    btn.onclick   = () => switchSource(key);
    wrap.appendChild(btn);
  });
}

function switchSource(key) {
  if (sourceData[key]?.status !== "ok") { toast(`${SOURCES[key].label} offline 😔`, "error"); return; }
  activeSource = key;
  renderSourcePills();
  renderEpisodes(sourceData[key].episodes);
  hidePlayer();
}

function setSubDub(type, btn) {
  subDub = type;
  document.querySelectorAll(".subdub-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  hidePlayer();
  toast(`switched to ${type.toUpperCase()}`, "success");
}

function renderEpisodes(episodes) {
  const grid = document.getElementById("ep-grid");
  document.getElementById("fallback-links")?.remove();
  grid.innerHTML = "";
  if (!episodes?.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="big">🎬</div><p>no episodes on this source</p></div>`;
    document.getElementById("ep-badge").textContent = "—";
    return;
  }
  document.getElementById("ep-badge").textContent = `${episodes.length} eps`;
  episodes.forEach((ep, i) => {
    const num = ep.number ?? ep.episode_no ?? (i + 1);
    const btn = document.createElement("button");
    btn.className   = "ep-btn";
    btn.textContent = `EP ${num}`;
    btn.addEventListener("click", () => playEpisode(ep, btn, num));
    grid.appendChild(btn);
  });
}

function renderFallback() {
  const grid = document.getElementById("ep-grid");
  grid.innerHTML = "";
  const name = encodeURIComponent(currentAnime?.title?.romaji || "");
  const div  = document.createElement("div");
  div.id = "fallback-links";
  div.style.cssText = "grid-column:1/-1;padding:1.2rem;text-align:center;font-size:.85rem;font-weight:700;color:var(--muted);background:var(--card);border-radius:12px;border:1.5px solid var(--border)";
  div.innerHTML = `<p style="margin-bottom:.8rem">all sources offline — watch on:</p>
    <a href="https://hianime.to/search?keyword=${name}" target="_blank" style="color:var(--accent);margin:0 .8rem">hianime ↗</a>
    <a href="https://gogoanime.tel/?s=${name}" target="_blank" style="color:var(--accent);margin:0 .8rem">gogoanime ↗</a>
    <a href="https://allanime.to/search?q=${name}" target="_blank" style="color:var(--accent);margin:0 .8rem">allanime ↗</a>`;
  grid.appendChild(div);
  document.getElementById("ep-badge").textContent = "—";
}

// ══════════════════════════════════════════════════════════
// PLAYING AN EPISODE
// ══════════════════════════════════════════════════════════
async function playEpisode(ep, btn, epNum) {
  document.querySelectorAll(".ep-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const wrap = document.getElementById("player-wrap");
  wrap.classList.add("open");
  setLoading(true, "fetching stream…");
  wrap.scrollIntoView({ behavior: "smooth", block: "center" });

  try {
    const rawData = await fetchStream(activeSource, ep, epNum);
    const { url, headers } = extractStreamUrl(activeSource, rawData);
    if (!url) throw new Error("stream URL is empty");

    document.getElementById("player-bar").textContent =
      `EP ${epNum} · ${SOURCES[activeSource].label} · ${subDub.toUpperCase()}`;
    loadHLS(url, headers);
  } catch(e) {
    setLoading(false);
    toast(`${e.message} — try switching source above`, "error");
  }
}

// ══════════════════════════════════════════════════════════
// HLS PLAYER
// ══════════════════════════════════════════════════════════
function loadHLS(url, headers = {}) {
  const video = document.getElementById("video-el");
  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      xhrSetup: xhr => Object.entries(headers).forEach(([k,v]) => { try{xhr.setRequestHeader(k,v)}catch{} }),
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { setLoading(false); video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (_,d) => { if(d.fatal){ setLoading(false); toast("stream error — try another source","error"); } });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.addEventListener("loadedmetadata", () => setLoading(false), { once: true });
    video.play().catch(()=>{});
  } else {
    setLoading(false); toast("browser doesn't support HLS 😕","error");
  }
}

function hidePlayer() {
  const v = document.getElementById("video-el");
  v.pause(); v.src = "";
  if (hls) { hls.destroy(); hls = null; }
  document.getElementById("player-wrap").classList.remove("open");
  document.getElementById("player-bar").textContent = "pick an episode below";
}

// ══════════════════════════════════════════════════════════
// CUSTOM PLAYER CONTROLS
// ══════════════════════════════════════════════════════════
const vid = document.getElementById("video-el");
function setLoading(on, msg="") {
  const el = document.getElementById("vid-loading");
  document.getElementById("vid-loading-msg").textContent = msg;
  el.classList.toggle("hidden", !on);
}
function togglePlay() { vid.paused ? vid.play() : vid.pause(); }
vid.addEventListener("play",  () => { document.getElementById("icon-play").style.display="none";  document.getElementById("icon-pause").style.display=""; });
vid.addEventListener("pause", () => { document.getElementById("icon-play").style.display="";      document.getElementById("icon-pause").style.display="none"; });
document.getElementById("vid-container").addEventListener("click", e => { if(e.target.closest(".vid-controls")) return; togglePlay(); flashControls(); });
function skipTime(s) { vid.currentTime = Math.max(0, Math.min(vid.duration||0, vid.currentTime+s)); flashControls(); }
vid.addEventListener("timeupdate", () => {
  if(!vid.duration) return;
  const p = (vid.currentTime/vid.duration)*100;
  document.getElementById("progress-fill").style.width = p+"%";
  document.getElementById("progress-input").value = p;
  document.getElementById("time-label").textContent = fmt(vid.currentTime)+" / "+fmt(vid.duration);
});
document.getElementById("progress-input").addEventListener("input", e => { vid.currentTime = (e.target.value/100)*(vid.duration||0); });
function fmt(s) { if(!s||isNaN(s)) return "0:00"; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`; }
const volSlider = document.getElementById("vol-slider");
volSlider.addEventListener("input", e => { vid.volume=+e.target.value; vid.muted=vid.volume===0; updateMute(); });
function toggleMute() { vid.muted=!vid.muted; if(!vid.muted&&vid.volume===0) vid.volume=0.5; volSlider.value=vid.muted?0:vid.volume; updateMute(); }
function updateMute() { const m=vid.muted||vid.volume===0; document.getElementById("icon-vol").style.display=m?"none":""; document.getElementById("icon-mute").style.display=m?"":"none"; }
function toggleSubtitles() {
  subtitleOn=!subtitleOn; document.getElementById("cc-btn").classList.toggle("active-cc",subtitleOn);
  if(hls){ hls.subtitleDisplay=subtitleOn; hls.subtitleTrack=subtitleOn&&hls.subtitleTracks.length?0:-1; }
  else { for(const t of vid.textTracks) t.mode=subtitleOn?"showing":"hidden"; }
  toast(subtitleOn?"subtitles on":"subtitles off","");
}
function toggleFullscreen() {
  const el=document.getElementById("vid-container");
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||vid.webkitEnterFullscreen).call(el);
  } else { (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
}
function flashControls() {
  const c=document.getElementById("vid-container"); c.classList.add("show-controls");
  clearTimeout(ctrlTimer); ctrlTimer=setTimeout(()=>c.classList.remove("show-controls"),3000);
}
document.getElementById("vid-container").addEventListener("mousemove", flashControls);
document.getElementById("vid-container").addEventListener("touchstart", flashControls, {passive:true});
document.addEventListener("keydown", e => {
  if(!document.getElementById("player-wrap").classList.contains("open")||e.target.tagName==="INPUT") return;
  if(e.code==="Space"){e.preventDefault();togglePlay();}
  if(e.code==="ArrowRight") skipTime(10);
  if(e.code==="ArrowLeft")  skipTime(-10);
  if(e.code==="KeyM") toggleMute();
  if(e.code==="KeyC") toggleSubtitles();
  if(e.code==="KeyF") toggleFullscreen();
});

// ══════════════════════════════════════════════════════════
// OPENING AN ANIME
// ══════════════════════════════════════════════════════════
async function openAnime(item) {
  currentAnime = item;
  const title  = item.title.english || item.title.romaji;
  showView("detail");

  document.getElementById("detail-img").src           = item.coverImage.large;
  document.getElementById("detail-title").textContent = title;

  const raw  = await fetchDesc(item.id);
  const desc = document.getElementById("detail-desc");
  desc.textContent = raw.replace(/<[^>]+>/g,""); desc.classList.remove("expanded");

  const tags = document.getElementById("detail-tags");
  tags.innerHTML = (item.genres||[]).slice(0,5).map(g=>`<span class="detail-tag">${g}</span>`).join("")
    + (item.averageScore ? `<span class="detail-tag">⭐ ${item.averageScore/10}/10</span>` : "");

  hidePlayer();
  document.getElementById("ep-grid").innerHTML = '<div class="spinner"></div>';
  document.getElementById("ep-badge").textContent = "—";
  subDub = "sub";
  document.getElementById("btn-sub").classList.add("active");
  document.getElementById("btn-dub").classList.remove("active");

  probeSources(item.title.romaji, item.title.english);
}

async function fetchDesc(id) {
  try { const d=await anilistQ(`query($id:Int){Media(id:$id){description}}`,{id}); return d.Media.description||""; } catch { return ""; }
}

// ══════════════════════════════════════════════════════════
// BROWSE / SEARCH
// ══════════════════════════════════════════════════════════
const F = "id title{romaji english}coverImage{large}episodes status genres averageScore";

async function loadTrending() {
  document.getElementById("home-grid").innerHTML='<div class="spinner"></div>';
  try { const d=await anilistQ(`query{Page(page:1,perPage:30){media(sort:TRENDING_DESC,type:ANIME,status_not:NOT_YET_RELEASED){${F}}}}`); renderGrid(d.Page.media,"home-grid"); }
  catch(e){ showErr("home-grid",e.message); }
}
async function loadSeasonal() {
  document.getElementById("home-grid").innerHTML='<div class="spinner"></div>';
  const m=new Date().getMonth(), y=new Date().getFullYear();
  const s=m<3?"WINTER":m<6?"SPRING":m<9?"SUMMER":"FALL";
  try { const d=await anilistQ(`query($s:MediaSeason,$y:Int){Page(page:1,perPage:30){media(season:$s,seasonYear:$y,sort:POPULARITY_DESC,type:ANIME){${F}}}}`,{s,y}); renderGrid(d.Page.media,"home-grid"); }
  catch(e){ showErr("home-grid",e.message); }
}
async function doSearch() {
  const q=document.getElementById("search-input").value.trim(); if(!q) return;
  showView("search"); document.getElementById("search-heading").textContent=`Results for "${q}"`;
  document.getElementById("search-grid").innerHTML='<div class="spinner"></div>';
  try { const d=await anilistQ(`query($s:String){Page(page:1,perPage:30){media(search:$s,type:ANIME){${F}}}}`,{s:q}); renderGrid(d.Page.media,"search-grid"); }
  catch(e){ showErr("search-grid",e.message); }
}
function renderGrid(items, gridId) {
  const grid=document.getElementById(gridId); grid.innerHTML="";
  if(!items?.length){ grid.innerHTML='<div class="empty"><div class="big">😅</div><p>nothing found!</p></div>'; return; }
  items.forEach((item,i)=>{
    const title=item.title.english||item.title.romaji;
    const card=document.createElement("div"); card.className="anime-card"; card.style.animationDelay=`${i*.04}s`;
    card.innerHTML=`<img class="card-img" src="${item.coverImage.large}" alt="${title}" loading="lazy"/>
      <div class="card-body"><div class="card-title">${title}</div>
      <div class="card-sub">${item.episodes?item.episodes+" eps":item.status||""}</div></div>`;
    card.addEventListener("click",()=>openAnime(item)); grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════
// VIEW MANAGEMENT + UTILS
// ══════════════════════════════════════════════════════════
function showView(n){
  document.getElementById("home-view").style.display=n==="home"?"block":"none";
  document.getElementById("search-view").style.display=n==="search"?"block":"none";
  if(n==="detail"){ document.getElementById("detail-view").classList.add("open"); document.getElementById("home-view").style.display="none"; document.getElementById("search-view").style.display="none"; }
  else document.getElementById("detail-view").classList.remove("open");
}
function goHome(){ hidePlayer(); showView("home"); document.getElementById("search-input").value=""; }
function toggleReadMore(){ const d=document.getElementById("detail-desc"),b=document.getElementById("read-more-btn"); b.textContent=d.classList.toggle("expanded")?"show less ↑":"read more ↓"; }
function showErr(id,m){ document.getElementById(id).innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">⚠️</div><p>${m}</p></div>`; }
function switchTab(tab,el){ document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active")); el.classList.add("active"); showView("home"); document.getElementById("search-input").value=""; document.getElementById("home-title").textContent=tab==="trending"?"🔥 Trending Now":"🌸 This Season"; tab==="trending"?loadTrending():loadSeasonal(); }
function toast(msg,type=""){ const el=document.getElementById("toast"); el.textContent=msg; el.className=`show ${type}`; clearTimeout(el._t); el._t=setTimeout(()=>{el.className="";},3500); }
function initTheme(){ document.documentElement.setAttribute("data-theme",localStorage.getItem("watchime-theme")||"light"); }
function toggleTheme(){ const n=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light"; document.documentElement.setAttribute("data-theme",n); localStorage.setItem("watchime-theme",n); }

document.getElementById("search-input").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
document.getElementById("back-btn").addEventListener("click",()=>{hidePlayer();showView("home");});

initTheme();
loadTrending();
</script>
